name: Unit Testing
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  phpunit:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb
        env:
          MYSQL_ROOT_PASSWORD: root
    strategy:
      matrix:
        php-versions: ['8.1']
    name: Run phpunit tests
    env:
      extensions: mysql
      key: cache-v1
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      # - name: Cache composer dependencies
      #   id: cache-primes
      #   uses: actions/cache@v4
      #   with:
      #     path: /root/.cache/composer
      #     key: cache-1

      - name: Setup PHP
        uses: https://github.com/shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          coverage: none
          tools: composer, phpunit-polyfills

      - name: Install Composer dependencies for PHP
        uses: "ramsey/composer-install@v1"

      - name: Install mysqladmin
        run: sudo apt update && sudo apt -y upgrade && sudo apt -y install mysql-client

      - name: Setup Test Environment
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest

      - run: cat /tmp/wordpress-tests-lib/wp-tests-config.php

      - name: Unit Testing
        run: phpunit
        env:
          PHP_VERSION: ${{ matrix.php-versions }}
