name: PHPStan Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  phpstan:
    name: PHPStan for WordPress
        runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb
        env:
          MYSQL_ROOT_PASSWORD: root
    strategy:
      matrix:
        php-versions: ['7.4', '8.1']
    env:
      extensions: mysql
      key: cache-v1
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Cache Composer
        id: cache-composer
        uses: https://code.forgejo.org/actions/cache@v4
        with:
          path: |
            ./vendor/
          key: cache-composer-3

      - name: Setup PHP
        uses: https://github.com/shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: dom, iconv, json, libxml, zip
          coverage: none
          tools: composer, cs2pr
        env:
          runner: self-hosted

      - name: Install Composer dependencies for PHP
        if: steps.cache-composer.outputs.cache-hit != 'true'
        uses: ramsey/composer-install@v3

      - name: Log debug information
        run: |
          git --version
          php --version
          composer --version

      - name: Install third party plugins, so that PHP Stan finds that functions
        if: steps.cache-wordpress.outputs.cache-hit != 'true'
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest true false false true

      - name: Running PHPStan Analyze
        if: ${{ success() || failure() }}
        run: echo 1
