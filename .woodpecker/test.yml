when:
  - event: push
    branch: woodpecker

steps:
  - name: build
    image: wordpressdevelop/phpunit
    environment:
      WP_TESTS_PHPUNIT_POLYFILLS_PATH: vendor/yoast/phpunit-polyfills
    commands:
      - apt-get clean
      - apt-get -yqq update
      - apt-get -yqqf install zip unzip subversion
      - docker-php-ext-enable mbstring mysqli intl gd zip
      - bash bin/install-wp-tests.sh wordpress_tests root mysql mysql latest true
      - composer require --dev yoast/phpunit-polyfills:"^3.0"
      - composer install
      - phpunit --configuration phpunit.xml.dist


services:
  - name: database
    image: mysql
    environment:
      MYSQL_DATABASE: wordpress_tests
      MYSQL_ROOT_PASSWORD: mysql